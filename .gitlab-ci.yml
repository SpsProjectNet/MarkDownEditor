# GitLab CI/CD pipeline for building the app and publishing update info.
#
# On every version tag (e.g. v1.0.1) it builds the Linux and Windows packages,
# then deploys them together with a small "latest.json" to GitLab Pages.
# The app reads latest.json (UPDATE_INFO_URL in main.js) to notify the user
# when a newer version exists, and opens the download page on request.
#
# Notes:
#   - The app only NOTIFIES and opens the download page; it does not
#     auto-download or auto-install. This works on every platform.
#   - macOS builds require a macOS runner and are not produced here.
#   - Set UPDATE_INFO_URL / DOWNLOAD_PAGE_URL in main.js to match your project,
#     e.g. https://<USER>.gitlab.io/<REPO>/latest.json

image: electronuserland/builder:wine

stages:
  - build
  - deploy

build:
  stage: build
  rules:
    - if: $CI_COMMIT_TAG          # build only when a version tag is pushed
  script:
    - npm install
    - npm run dist:linux -- --publish never
    - npx electron-builder --win --publish never
  artifacts:
    paths:
      - dist/
    expire_in: 1 week

pages:
  stage: deploy
  rules:
    - if: $CI_COMMIT_TAG
  dependencies:
    - build
  script:
    - mkdir -p public
    # Copy the installers so the download page can serve them.
    - cp dist/*.AppImage public/ 2>/dev/null || true
    - cp dist/*.deb public/ 2>/dev/null || true
    - cp dist/*.exe public/ 2>/dev/null || true
    # Generate latest.json from the tag (strip a leading "v").
    - VERSION="${CI_COMMIT_TAG#v}"
    - echo "{\"version\":\"$VERSION\",\"url\":\"$CI_PROJECT_URL/-/releases\"}" > public/latest.json
  artifacts:
    paths:
      - public
