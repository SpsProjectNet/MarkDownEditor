<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Markdown Editor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Tab bar: one tab per open file -->
  <nav id="tabBar" class="tab-bar"></nav>

  <!-- Collapsible controls: file actions plus formatting commands, text only.
       Starts collapsed (only the file actions and the "Edit" toggle are shown). -->
  <section id="formatBar" class="format-bar collapsed">
    <div class="format-group file-actions">
      <button id="openBtn" data-i18n="open" data-i18n-title="open.title">Open</button>
      <button id="sourceBtn" data-i18n="source" data-i18n-title="source.title">Source</button>
      <button id="saveBtn" data-i18n="save" data-i18n-title="save.title">Save</button>
      <button id="undoBtn" class="arrow-btn" data-i18n-title="undo.title" title="Undo">&#8592;</button>
      <button id="redoBtn" class="arrow-btn" data-i18n-title="redo.title" title="Redo">&#8594;</button>
      <button id="printBtn" data-i18n="print" data-i18n-title="print.title">Print</button>
      <button id="exportBtn" data-i18n-title="pdf.title">PDF</button>
    </div>

    <button id="formatToggle" class="format-toggle" data-i18n-title="edit.title">
      <span class="format-chevron">v</span> <span data-i18n="edit">Edit</span>
    </button>

    <div class="format-actions">
      <button data-command="h1" data-i18n-title="h1.title">H1</button>
      <button data-command="h2" data-i18n-title="h2.title">H2</button>
      <button data-command="h3" data-i18n-title="h3.title">H3</button>
      <button data-command="paragraph" data-i18n-title="paragraph.title">P</button>
      <button data-command="bold" data-i18n-title="bold.title"><strong>B</strong></button>
      <button data-command="italic" data-i18n-title="italic.title"><em>I</em></button>
      <button data-command="unorderedList" data-i18n="ul" data-i18n-title="ul.title">List</button>
      <button data-command="orderedList" data-i18n-title="ol.title">1.</button>
      <button data-command="quote" data-i18n="quote" data-i18n-title="quote.title">Quote</button>
      <button data-command="code" data-i18n="code" data-i18n-title="code.title">Code</button>
      <button data-command="link" data-i18n="link" data-i18n-title="link.title">Link</button>
      <button data-media="image" data-i18n="image" data-i18n-title="image.title">Image</button>
      <div class="emoji-menu">
        <button id="iconBtn" data-i18n="icon" data-i18n-title="icon.title">Icon</button>
        <div id="emojiPicker" class="emoji-picker hidden"></div>
      </div>
      <button data-media="video" data-i18n="video" data-i18n-title="video.title">Video</button>
    </div>

    <!-- Help and language menus, pinned to the right of the controls bar -->
    <div id="helpMenu" class="help-menu">
      <div class="lang-menu">
        <button id="langBtn" class="lang-btn" data-i18n-title="menu.language">EN</button>
        <div id="langDropdown" class="help-dropdown lang-dropdown hidden">
          <div class="help-label" data-i18n="menu.language">Language</div>
          <div id="languageList"></div>
        </div>
      </div>

      <button id="helpToggle" class="help-toggle" data-i18n-title="help.title">?</button>
      <div id="helpDropdown" class="help-dropdown hidden">
        <button data-help="update" hidden>Update</button>
        <button data-help="about" data-i18n="menu.about">About</button>
      </div>
    </div>
  </section>

  <!-- Layout: shows the preview only by default; "Source" turns it into a split view -->
  <main class="split">
    <section class="pane editor-pane">
      <textarea id="editor" data-i18n-placeholder="editor.placeholder" placeholder="Write your Markdown here..."></textarea>
    </section>
    <section class="pane preview-pane">
      <div id="preview" contenteditable="true" spellcheck="false"></div>
    </section>
  </main>

  <footer class="statusbar">
    <span id="status">No file open</span>
    <span id="version" class="version"></span>
  </footer>

  <script src="./node_modules/marked/marked.min.js"></script>
  <script src="./node_modules/turndown/dist/turndown.js"></script>
  <script src="renderer.js"></script>
</body>
</html>
