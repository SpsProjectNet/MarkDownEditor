# Build the app for Windows, macOS and Linux in the cloud and publish a release.
#
# Trigger: pushing a version tag (e.g. v0.0.2) or running it manually.
# Result:
#   - one build job per OS produces the native installers;
#   - the "release" job attaches every installer to a GitHub Release.
#
# The download page and latest.json are deployed separately by pages.yml.
#
# Notes:
#   - macOS builds are not code-signed (no Apple certificate); the .dmg works
#     but Gatekeeper shows a warning on first launch.

name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            script: dist:linux
          - os: windows-latest
            script: dist:win
          - os: macos-latest
            script: dist:mac
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run ${{ matrix.script }} -- --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v7
        with:
          name: build-${{ matrix.os }}
          if-no-files-found: ignore
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.AppImage
            dist/*.deb
            dist/*.blockmap

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/**/*
